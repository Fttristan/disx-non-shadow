name: Build Forge And Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example v1.2.0)"
        required: true
        type: string
      release_name:
        description: "Release title (optional)"
        required: false
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Forge
        env:
          GPR_USER: ${{ secrets.PKG_USER }}
          GPR_KEY: ${{ secrets.PKG_PASSWORD }}
        run: ./gradlew -PforgeOnly=true :forge:build --no-daemon --stacktrace

      - name: Collect release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t jars < <(find forge/build/libs -maxdepth 1 -type f -name "*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-dev-shadow.jar" | sort)

          if [[ ${#jars[@]} -eq 0 ]]; then
            echo "No release jars were found in forge/build/libs"
            exit 1
          fi

          {
            echo "files<<EOF"
            printf '%s\n' "${jars[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-build-jars
          path: ${{ steps.assets.outputs.files }}
          if-no-files-found: error

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            if [[ -n "${{ inputs.release_name }}" ]]; then
              name="${{ inputs.release_name }}"
            else
              name="Release ${tag}"
            fi
            draft="${{ inputs.draft }}"
            prerelease="${{ inputs.prerelease }}"
          else
            tag="${{ github.ref_name }}"
            name="Release ${tag}"
            draft="false"
            prerelease="false"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "draft=${draft}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.name }}
          draft: ${{ steps.meta.outputs.draft }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: ${{ steps.assets.outputs.files }}
